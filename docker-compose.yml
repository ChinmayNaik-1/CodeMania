services:
  postgres:
    image: postgres:15-alpine
    container_name: codemania-postgres
    environment:
      POSTGRES_USER: codemania
      POSTGRES_PASSWORD: codemania
      POSTGRES_DB: codemania
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codemania"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemania-network

  redis:
    image: redis:7-alpine
    container_name: codemania-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemania-network

volumes:
  pgdata:
  redisdata:

networks:
  codemania-network:
    driver: bridge
